<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OzKiz 모델 파인더</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red:        #e11d48;
    --red-50:     #fff1f2;
    --red-100:    #ffe4e6;
    --red-200:    #fecdd3;
    --gray-50:    #f9fafb;
    --gray-100:   #f3f4f6;
    --gray-200:   #e5e7eb;
    --gray-300:   #d1d5db;
    --gray-400:   #9ca3af;
    --gray-500:   #6b7280;
    --gray-600:   #4b5563;
    --gray-700:   #374151;
    --gray-800:   #1f2937;
    --gray-900:   #111827;
    --white:      #ffffff;
    --shadow-xs:  0 1px 2px rgba(0,0,0,.06);
    --shadow-sm:  0 1px 4px rgba(0,0,0,.08), 0 2px 8px rgba(0,0,0,.04);
    --shadow-md:  0 4px 16px rgba(0,0,0,.10);
    --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 20px;
    /* legacy compat */
    --primary: #e11d48; --primary-light: #fff1f2;
    --bg: #f9fafb; --text: #1f2937; --text-muted: #6b7280;
    --border: #e5e7eb; --success: #10b981;
    --shadow: 0 1px 4px rgba(0,0,0,.08);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--gray-50);
    color: var(--gray-800);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── 앱 레이아웃 ─────────────────────────────────── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* ── 왼쪽 세로 내비게이션 ────────────────────────── */
  .left-nav {
    width: 220px;
    min-width: 220px;
    background: var(--white);
    border-right: 1px solid var(--gray-200);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .nav-logo {
    padding: 20px 16px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--gray-100);
  }
  .nav-logo-mark {
    width: 30px; height: 30px;
    background: var(--red);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px; font-weight: 800;
  }
  .nav-logo-text { font-size: 15px; font-weight: 800; color: var(--gray-900); }
  .nav-logo-text span { color: var(--red); }

  .nav-body { flex: 1; overflow-y: auto; padding: 12px 8px; display: flex; flex-direction: column; gap: 2px; }

  .nav-group-label {
    font-size: 10px; font-weight: 700; color: var(--gray-400);
    text-transform: uppercase; letter-spacing: .8px;
    padding: 8px 8px 4px;
    margin-top: 8px;
  }
  .nav-group-label:first-child { margin-top: 0; }

  .nav-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border: none; border-radius: var(--r-md);
    background: transparent;
    color: var(--gray-600);
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; width: 100%; text-align: left;
    transition: background .15s, color .15s;
    position: relative;
  }
  .nav-btn:hover { background: var(--gray-100); color: var(--gray-900); }
  .nav-btn.active { background: var(--red-50); color: var(--red); }
  .nav-btn .ni { font-size: 17px; flex-shrink: 0; }
  .nav-badge {
    margin-left: auto;
    background: var(--red); color: white;
    border-radius: 10px; padding: 1px 7px;
    font-size: 10px; font-weight: 700; min-width: 18px; text-align: center;
  }

  .nav-footer {
    padding: 12px 8px;
    border-top: 1px solid var(--gray-100);
    display: flex; flex-direction: column; gap: 2px;
  }

  /* ── 메인 래퍼 ───────────────────────────────────── */
  .main-wrapper { flex: 1; display: flex; overflow: hidden; }

  /* ── 검색 패널 (좌측 서브패널) ────────────────────── */
  .search-panel {
    width: 260px; min-width: 260px;
    background: var(--white);
    border-right: 1px solid var(--gray-200);
    overflow-y: auto;
    padding: 20px 16px;
    display: flex; flex-direction: column; gap: 20px;
    flex-shrink: 0;
  }
  .search-panel.hidden { display: none; }

  .sp-title { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }

  .hashtag-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 5px 11px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid transparent; transition: all .2s;
    font-family: inherit;
  }
  .chip.active { background: var(--red); color: white; border-color: var(--red); }
  .chip:not(.active) { background: var(--red-50); color: var(--red); border-color: var(--red-100); }
  .chip:not(.active):hover { border-color: var(--red); }

  .tag-add-row { display: flex; gap: 6px; margin-top: 4px; }
  .tag-add-input {
    flex: 1; padding: 7px 8px 7px 10px;
    border: 1.5px solid var(--gray-200); border-radius: var(--r-sm);
    font-family: inherit; font-size: 12px; background: var(--gray-50);
    outline: none; transition: border-color .2s;
  }
  .tag-add-input:focus { border-color: var(--red); background: white; }
  .tag-add-btn {
    width: 32px; height: 32px; border-radius: var(--r-sm);
    background: var(--red); color: white; border: none;
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .search-btn {
    width: 100%; padding: 10px;
    background: var(--red); color: white; border: none;
    border-radius: var(--r-md); font-family: inherit;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: opacity .15s, transform .1s;
    box-shadow: 0 2px 8px rgba(225,29,72,.3);
  }
  .search-btn:hover { opacity: .92; }
  .search-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .limit-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--gray-500); margin-bottom: 4px; }
  .limit-val { font-weight: 700; color: var(--red); }
  input[type=range] { width: 100%; accent-color: var(--red); cursor: pointer; }

  /* ── 콘텐츠 영역 ─────────────────────────────────── */
  .content-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    position: sticky; top: 0; z-index: 5;
    flex-wrap: wrap; gap: 8px;
  }
  .result-info { font-size: 13px; color: var(--gray-500); }
  .result-info strong { color: var(--gray-900); }

  .sort-tabs { display: flex; gap: 4px; }
  .sort-tab {
    padding: 6px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: none; background: transparent; color: var(--gray-500);
    font-family: inherit; transition: all .15s;
  }
  .sort-tab:hover { background: var(--gray-100); color: var(--gray-800); }
  .sort-tab.active { background: var(--gray-900); color: white; }

  .cards-wrapper { padding: 20px 24px; }
  .cards-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }

  /* ── 카드 ────────────────────────────────────────── */
  .card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--r-lg);
    overflow: hidden;
    box-shadow: var(--shadow-xs);
    transition: transform .2s, box-shadow .2s;
    cursor: pointer; position: relative;
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--gray-300); }
  .card-image {
    width: 100%; aspect-ratio: 4/5;
    background: var(--gray-100);
    display: flex; align-items: center; justify-content: center;
    font-size: 52px; position: relative; overflow: hidden;
  }
  .card-image img { width: 100%; height: 100%; object-fit: cover; }
  .card-image-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 55%, rgba(0,0,0,.4)); }
  .card-badges { position: absolute; top: 8px; left: 8px; display: flex; gap: 4px; z-index: 2; }
  .badge {
    padding: 2px 7px; border-radius: 6px;
    font-size: 10px; font-weight: 700; backdrop-filter: blur(8px);
  }
  .badge.type { background: rgba(255,255,255,.9); color: var(--gray-600); }
  .badge.real { background: #10b981; color: white; }
  .fav-btn {
    position: absolute; top: 8px; right: 8px;
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,.9); border: none; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all .2s; z-index: 2; box-shadow: var(--shadow-xs);
  }
  .fav-btn:hover { transform: scale(1.15); }
  .fav-btn.active { background: var(--red); }
  .card-body { padding: 12px; }
  .card-username { font-weight: 700; font-size: 13px; margin-bottom: 2px; color: var(--gray-900); }
  .card-caption {
    font-size: 11px; color: var(--gray-500); margin-bottom: 8px;
    line-height: 1.4; overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .engagement-bar { height: 3px; border-radius: 2px; background: var(--gray-100); margin-bottom: 8px; overflow: hidden; }
  .engagement-fill { height: 100%; border-radius: 2px; background: var(--red); }
  .card-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 10px; }
  .stat { text-align: center; }
  .stat-val { font-size: 13px; font-weight: 700; color: var(--gray-800); }
  .stat-key { font-size: 10px; color: var(--gray-400); margin-top: 1px; }
  .card-footer { display: flex; gap: 6px; }
  .btn-save {
    flex: 1; padding: 7px; background: var(--red); color: white;
    border: none; border-radius: var(--r-sm);
    font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer;
    transition: opacity .15s;
  }
  .btn-save:hover { opacity: .88; }
  .btn-ig {
    width: 32px; height: 32px;
    border: 1.5px solid var(--gray-200); border-radius: var(--r-sm);
    background: white; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; transition: border-color .2s;
    color: var(--gray-600);
  }
  .btn-ig:hover { border-color: var(--red); }

  /* ── 저장 모델 카드 (1차픽/최종누적 탭) ─────────── */
  .saved-cards-list { display: flex; flex-direction: column; gap: 10px; }
  .saved-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--r-md);
    overflow: hidden;
    display: flex;
    box-shadow: var(--shadow-xs);
    transition: box-shadow .2s;
  }
  .saved-card:hover { box-shadow: var(--shadow-sm); }
  .saved-card-img {
    width: 110px; min-width: 110px; align-self: stretch;
    flex-shrink: 0; background: var(--gray-100);
    display: flex; align-items: center; justify-content: center; font-size: 36px;
    overflow: hidden;
  }
  .saved-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .saved-card-body {
    padding: 8px 10px; flex: 1; min-width: 0;
    display: flex; flex-direction: column; gap: 4px; justify-content: center;
  }
  .saved-card-username { font-weight: 700; font-size: 12px; color: var(--gray-900); }
  .saved-card-username a { color: inherit; text-decoration: none; }
  .saved-card-username a:hover { color: var(--red); }
  .saved-card-sub { font-size: 10px; color: var(--gray-400); }
  /* 아이 프로필 배지 */
  .profile-badges { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  .profile-badge {
    display: inline-flex; align-items: center;
    padding: 1px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 600;
    background: #fdf2f8; color: #9d174d;
    border: 1px solid #fce7f3; white-space: nowrap;
  }
  .saved-card-actions { display: flex; align-items: center; justify-content: space-between; gap: 6px; }

  /* 다중 평가자 별점 — 가로 한 줄 배치 */
  .multi-rating-wrap {
    background: var(--gray-50); border-radius: 8px;
    padding: 8px 12px; margin-top: 4px;
  }
  .multi-rating { display: flex; flex-direction: row; gap: 14px; align-items: center; flex-wrap: wrap; }
  .rating-row { display: flex; align-items: center; gap: 4px; }
  .rating-name { font-size: 11px; font-weight: 600; color: var(--gray-600); white-space: nowrap; }
  .star-rating { display: flex; gap: 2px; }
  .star {
    font-size: 18px; cursor: pointer; line-height: 1;
    color: var(--gray-200); transition: transform .12s, color .12s;
  }
  .star.filled { color: #f59e0b; }
  .star:hover { transform: scale(1.25); color: #f59e0b; }
  .avg-badge {
    font-size: 13px; font-weight: 800;
    color: var(--gray-300); white-space: nowrap;
  }
  .avg-badge.rated { color: var(--red); }
  .btn-unsave {
    width: 28px; height: 28px; padding: 0;
    font-size: 15px; line-height: 1;
    color: var(--gray-400); background: transparent;
    border: none; border-radius: 6px;
    cursor: pointer; transition: background .15s, color .15s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-unsave:hover { color: var(--red); background: var(--red-50); }

  /* ── 빈 상태 ────────────────────────────────────── */
  .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--gray-400); }
  .empty-state .es-icon { font-size: 56px; margin-bottom: 16px; }
  .empty-state .es-title { font-size: 16px; font-weight: 700; color: var(--gray-600); margin-bottom: 6px; }
  .empty-state .es-sub { font-size: 13px; }
  .tab-empty { text-align: center; padding: 40px 12px; color: var(--gray-400); font-size: 12px; line-height: 1.6; }

  /* ── 로딩 ────────────────────────────────────────── */
  .loading-msg { text-align: center; padding: 60px 20px; grid-column: 1/-1; }
  .loading-spinner { font-size: 36px; animation: spin 1.5s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 배너 ────────────────────────────────────────── */
  #infoBanner { padding: 0 24px; }

  /* ── 모달 ────────────────────────────────────────── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: var(--r-xl); width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,.25); }
  .modal-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 16px; font-weight: 800; }
  .modal-close { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--gray-100); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--gray-600); }
  .modal-body { padding: 20px 22px; }
  .modal-img { width: 100%; height: 260px; border-radius: var(--r-md); margin-bottom: 14px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 64px; overflow: hidden; }
  .modal-img img { width: 100%; height: 100%; object-fit: cover; }
  .modal-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
  .modal-stat { text-align: center; padding: 10px 6px; background: var(--gray-50); border-radius: var(--r-sm); border: 1px solid var(--gray-100); }
  .modal-stat-val { font-size: 18px; font-weight: 800; color: var(--red); }
  .modal-stat-key { font-size: 10px; color: var(--gray-400); margin-top: 1px; }
  .modal-caption { font-size: 13px; color: var(--gray-600); line-height: 1.6; margin-bottom: 16px; background: var(--gray-50); padding: 12px; border-radius: var(--r-sm); max-height: 100px; overflow-y: auto; }
  .modal-actions { display: flex; gap: 8px; }
  .modal-btn { flex: 1; padding: 11px; border-radius: var(--r-md); border: none; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; }
  .modal-btn.primary { background: var(--red); color: white; }
  .modal-btn.secondary { background: var(--gray-50); color: var(--gray-700); border: 1.5px solid var(--gray-200); }
  .modal-btn:hover { opacity: .88; }

  /* ── 설정 모달 ───────────────────────────────────── */
  #settingsOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  #settingsOverlay.open { display: flex; }

  /* ── 토스트 ──────────────────────────────────────── */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--gray-900); color: white; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-md); transition: transform .3s; z-index: 400; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── DB 탭 ───────────────────────────────────────── */
  .db-drop-zone {
    border: 2px dashed var(--gray-300); border-radius: var(--r-lg);
    padding: 28px 20px; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s;
    background: var(--gray-50); margin-bottom: 16px;
  }
  .db-drop-zone:hover, .db-drop-zone.drag-over { border-color: var(--red); background: var(--red-50); }
  .db-drop-zone .dz-icon { font-size: 36px; margin-bottom: 8px; }
  .db-drop-zone .dz-title { font-size: 14px; font-weight: 700; color: var(--gray-700); margin-bottom: 4px; }
  .db-drop-zone .dz-sub { font-size: 12px; color: var(--gray-400); }
  .import-progress { font-size: 12px; color: var(--gray-500); text-align: center; padding: 8px 0; }
  .db-table-wrap { overflow-x: auto; border-radius: var(--r-md); border: 1px solid var(--gray-200); }
  .db-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .db-table th { background: var(--gray-50); padding: 8px 12px; text-align: left; font-weight: 700; color: var(--gray-600); border-bottom: 1px solid var(--gray-200); white-space: nowrap; }
  .db-table td { padding: 7px 12px; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); }
  .db-table tr:last-child td { border-bottom: none; }
  .db-table tr:hover td { background: var(--gray-50); }

  /* ── 프로젝트 선택 ───────────────────────────────── */
  .project-select {
    width: 100%; padding: 5px 8px; border-radius: 6px;
    border: 1.5px solid var(--gray-200); background: white;
    font-family: inherit; font-size: 11px; color: var(--gray-700);
    cursor: pointer; outline: none; transition: border-color .15s;
  }
  .project-select:focus { border-color: var(--red); }
  .project-select.has-project { border-color: var(--red); background: var(--red-50); color: var(--red); font-weight: 600; }
  .project-filter-wrap { display: flex; align-items: center; gap: 6px; }
  .project-filter-label { font-size: 11px; color: var(--gray-500); white-space: nowrap; }

  /* ── 캐스팅 메모 ─────────────────────────────────── */
  .memo-input {
    width: 100%; padding: 6px 8px; border-radius: 6px;
    border: 1.5px solid var(--gray-200); background: white;
    font-family: inherit; font-size: 11px; color: var(--gray-700);
    resize: none; outline: none; transition: border-color .15s;
    min-height: 44px; line-height: 1.5;
  }
  .memo-input:focus { border-color: var(--red); }
  .memo-input::placeholder { color: var(--gray-300); }
  .memo-section { margin-top: 6px; }
  .memo-label { font-size: 10px; font-weight: 700; color: var(--gray-400); margin-bottom: 3px; }

  /* ── 스크롤바 ────────────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">

  <!-- ── 왼쪽 세로 내비게이션 ── -->
  <nav class="left-nav">
    <div class="nav-logo">
      <div class="nav-logo-mark">O</div>
      <div class="nav-logo-text">Oz<span>Kiz</span></div>
    </div>

    <div class="nav-body">
      <div class="nav-group-label">캐스팅</div>
      <button class="nav-btn active" id="nav-search" onclick="switchTab('search')">
        <span class="ni">🔍</span> 모델 검색
      </button>
      <button class="nav-btn" id="nav-pick" onclick="switchTab('pick')">
        <span class="ni">📥</span> 1차 픽
        <span class="nav-badge" id="pick-badge">0</span>
      </button>
      <button class="nav-btn" id="nav-final" onclick="switchTab('final')">

<script>
// ── 설정 ──────────────────────────────────────────────
const APIFY_TOKEN = ''; // 토큰은 ⚙️ 설정에서 입력 (코드에 노출 안 됨)
const APIFY_API   = 'https://api.apify.com/v2';
const VERSION     = 'v10';   // 배포 버전 확인용

let allPosts          = [];
let currentViewBuffer = [];
let savedIds          = new Set();   // 저장된 포스트 ID Set (빠른 조회용)
let savedModels       = [];          // 저장된 포스트 전체 객체 배열 (로컬 캐시)
let panelOpen         = false;
let currentTag        = '';

let tagBuffers    = {};   // 해시태그별 전체 버퍼 { '키즈모델': [...], '아동모델': [...] }
let tagShownUsers = {};   // 해시태그별 이미 본 계정 { '키즈모델': Set(), '아동모델': Set() }
const tagRotation = {};

// ── 해시태그 관리 (localStorage) ──────────────────────
const HASHTAGS_KEY = 'ozkiz_hashtags';
const DEFAULT_HASHTAGS = ['키즈모델','아동모델','유아모델','주니어모델','아역배우','키즈패션','키즈오오티디','피팅모델','여아모델','남아모델'];

function getHashtags() {
  try { return JSON.parse(localStorage.getItem(HASHTAGS_KEY)) || DEFAULT_HASHTAGS.slice(); }
  catch { return DEFAULT_HASHTAGS.slice(); }
}
function saveHashtags(list) { localStorage.setItem(HASHTAGS_KEY, JSON.stringify(list)); }

function renderHashtagChips() {
  const list = getHashtags();
  document.getElementById('hashtagChips').innerHTML = list.map((tag, i) => `
    <div class="chip ${tag === currentTag ? 'active' : ''}"
      style="display:inline-flex;align-items:center;gap:4px"
      onclick="selectChip(this,'${tag}')">
      #${tag}
      <span onclick="event.stopPropagation();removeHashtag(${i})"
        style="font-size:10px;opacity:0.55;cursor:pointer;line-height:1;padding:0 1px"
        title="삭제">✕</span>
    </div>`).join('');
}

function addHashtag() {
  const input = document.getElementById('newTagInput');
  const tag = input.value.replace(/^#/,'').trim();
  if (!tag) { showToast('해시태그를 입력해주세요'); return; }
  const list = getHashtags();
  if (list.includes(tag)) { showToast('이미 있는 해시태그예요'); input.value=''; return; }
  list.push(tag);
  saveHashtags(list);
  renderHashtagChips();
  input.value = '';
  showToast('#' + tag + ' 추가됐어요! ✅');
}

function removeHashtag(i) {
  const list = getHashtags();
  const removed = list.splice(i, 1)[0];
  saveHashtags(list);
  renderHashtagChips();
  showToast('#' + removed + ' 삭제됐어요');
}

// ── 버퍼 (재검색 시 새 결과 제공) ──────────────────────
// 해시태그별로 가져온 전체 데이터를 저장해두고,
// 재검색 시 아직 안 본 계정부터 우선 표시
// (postBuffers, shownUserSets 는 tagBuffers/tagShown 으로 통합됨)

// ── 배지 업데이트 ─────────────────────────────────────
function updateSavedBadge() {
  document.getElementById('savedBadge').textContent = `💝 저장됨 ${savedIds.size}개`;
}

// ── 탭 전환 (새 레이아웃) ─────────────────────────────
const RATING_THRESHOLD = 3;
let currentSidebarTab = 'search';

const PROJECTS = ['2026 S/S 룩북', '2026 F/W 아우터', '상시 피팅'];

function switchTab(tab) {
  currentSidebarTab = tab;

  // 내비 버튼 활성화 (db 탭 포함)
  ['search','pick','final','db'].forEach(t => {

  const isSaved  = tab === 'pick' || tab === 'final';

  document.getElementById('search-panel').classList.toggle('hidden', !isSearch);
  document.getElementById('search-toolbar').style.display  = isSearch ? '' : 'none';
  document.getElementById('saved-toolbar').style.display   = isSaved  ? '' : 'none';
  document.getElementById('cardsGrid').style.display       = isSearch ? '' : 'none';
  document.getElementById('savedModelsGrid').style.display = isSaved  ? '' : 'none';
  document.getElementById('dbGrid').style.display          = isDB     ? '' : 'none';

  if (isSaved) {
    document.getElementById('pick-list').style.display  = tab === 'pick'  ? '' : 'none';
    document.getElementById('final-list').style.display = tab === 'final' ? '' : 'none';
    document.getElementById('saved-resultInfo').textContent =
      tab === 'pick' ? '📥 1차 픽' : '⭐ 최종 누적';
  }

  if (tab === 'pick')  renderPickTab();
  if (tab === 'final') renderFinalTab();
}

// 현재 활성 저장 탭 재렌더 (프로젝트 필터 변경 시 호출)
function renderCurrentSavedTab() {
  if (currentSidebarTab === 'pick')  renderPickTab();
  if (currentSidebarTab === 'final') renderFinalTab();
}

// 프로젝트 필터 적용
function getProjectFilter() {
  const el = document.getElementById('projectFilter');
  return el ? el.value : '';
}

// ── 다중 평가자 평균 계산 ─────────────────────────────
const REVIEWERS = ['nicole', 'rachel', 'stella'];
const REVIEWER_LABELS = { nicole: '니콜', rachel: '레이첼', stella: '스텔라' };

function getRatings(p) {
  // 기존 단일 rating → 하위 호환 마이그레이션
  return p.ratings || { nicole: p.rating || 0, rachel: 0, stella: 0 };
}

function getAverageRating(p) {
  const r = getRatings(p);
  const scores = REVIEWERS.map(k => r[k] || 0).filter(v => v > 0);
  if (!scores.length) return 0;
  return scores.reduce((a, b) => a + b, 0) / scores.length;
}

// 투표한 사람 수 (0점 제외)
function getVoterCount(p) {
  const r = getRatings(p);
  return REVIEWERS.filter(k => (r[k] || 0) > 0).length;
}

// ── 최종 누적 분류 조건 ──────────────────────────────────
// 조건 1: 평균 점수 >= RATING_THRESHOLD (현재 3점)
// 조건 2: 투표 완료자 >= MIN_VOTERS (현재 2명 — 3명으로 바꾸려면 아래 값을 3으로 수정)
const MIN_VOTERS = REVIEWERS.length; // 전원(3명) 투표 필수. 2명으로 낮추려면 2로 변경

function isReadyForFinal(p) {
  return getVoterCount(p) === MIN_VOTERS && getAverageRating(p) >= RATING_THRESHOLD;
}

function updateTabBadges() {
  const picks  = savedModels.filter(p => !isReadyForFinal(p)).length;
  const finals = savedModels.filter(p =>  isReadyForFinal(p)).length;
  const pb = document.getElementById('pick-badge');
  const fb = document.getElementById('final-badge');
  if (pb) pb.textContent = picks;
  if (fb) fb.textContent = finals;
}

function applyProjectFilter(list) {
  const pf = getProjectFilter();
  if (!pf) return list;
  return list.filter(p => (p.project || '') === pf);
}

function renderPickTab() {
  let picks = savedModels.filter(p => !isReadyForFinal(p));
  picks = applyProjectFilter(picks);
  updateTabBadges();
  document.getElementById('pick-list').innerHTML = picks.length
    ? picks.map(p => savedModelCard(p)).join('')
    : `<div class="tab-empty">📭 1차 픽된 모델이 없어요<br>검색 탭에서 모델을 저장해 보세요</div>`;
}

function renderFinalTab() {
  let finals = savedModels.filter(p => isReadyForFinal(p));
  finals = applyProjectFilter(finals);
  updateTabBadges();
  document.getElementById('final-list').innerHTML = finals.length
    ? finals.map(p => savedModelCard(p)).join('')
    : `<div class="tab-empty">⭐ 아직 최종 선발된 모델이 없어요<br>${MIN_VOTERS}명 이상 투표 + 평균 3점 이상이면 이동해요</div>`;
}

// ── 아이 프로필 정보 추출 (캡션 + 프로필 소개글 통합 검색) ──
function extractChildProfile(post) {
  // caption + 모든 biography 필드를 하나로 합침
  const raw = [
    post.caption,
    post.biography,
    post.ownerBiography,
    post.profileBio,
    post.bio,
    post.owner?.biography,
    post.owner?.bio,
  ].filter(Boolean).join(' ');

  if (!raw) return {};

  // ① 특수기호를 공백으로 치환 → 파싱 단순화
  //    괄호, 슬래시, 쉼표, 점(소수점 외), 물결, 특수문자 등을 모두 공백으로
  const t = raw
    .replace(/[()（）【】〔〕\[\]]/g, ' ')   // 괄호류
    .replace(/[\/｜|\\]/g, ' ')               // 슬래시/파이프
    .replace(/[,，、·・•※★☆]/g, ' ')         // 구분자
    .replace(/[-~～]/g, ' ')                  // 줄표/물결
    .replace(/\s+/g, ' ');                    // 연속 공백 정리

  const result = {};

  // ── 키 ─────────────────────────────────────────────
  // 패턴 1: "키 XXX", "키XXX", "신장 XXX" (공백 0~다수, 단위 없어도 OK)
  const h1 = t.match(/(?:키|신장)\s*(\d{2,3}(?:\.\d+)?)/);
  // 패턴 2: XXX + cm/센티 (소수점 허용, 앞뒤 공백 무관)
  const h2 = t.match(/(\d{2,3}(?:\.\d+)?)\s*(?:cm|CM|센티|센치|센치미터|센티미터)/);
  for (const m of [h1, h2]) {
    if (m) {
      const v = parseFloat(m[1]);
      if (v >= 80 && v <= 165) { result.height = m[1] + 'cm'; break; }
    }
  }

  // ── 몸무게 ─────────────────────────────────────────
  // 패턴 1: "몸무게 XX", "체중 XX"
  const w1 = t.match(/(?:몸무게|체중)\s+(\d{1,2}(?:\.\d+)?)/);
  // 패턴 2: XX + kg/키로 (소수점 허용)
  const w2 = t.match(/(\d{1,2}(?:\.\d+)?)\s*(?:kg|KG|Kg|키로|킬로|킬로그램)/);
  for (const m of [w1, w2]) {
    if (m) {
      const v = parseFloat(m[1]);
      if (v >= 5 && v <= 60) { result.weight = m[1] + 'kg'; break; }
    }
  }

  // ── 나이 / 출생연도 ────────────────────────────────
  // 우선순위: 4자리년생 > 2자리년생 > 개월 > 만N세 > N세/살 > 4자리년(단독)
  const birthTests = [
    // "2020년생", "2020 년 생", "19년생" (19XX도 처리)
    { re: /((?:19|20)\d{2})\s*년\s*생/,      fmt: m => m[1].slice(2) + '년생' },
    { re: /(\d{2})\s*년\s*생/,               fmt: m => m[1] + '년생' },
    // "48개월", "24 개월"
    { re: /(\d{2,3})\s*개월/,               fmt: m => m[1] + '개월' },
    // "만 8세", "만8살"
    { re: /만\s*(\d{1,2})\s*(?:세|살)/,     fmt: m => m[1] + '세' },
    // "8세", "8살" (1~18 범위)
    { re: /(\d{1,2})\s*(?:세|살)/,           fmt: m => {
        const v = parseInt(m[1]);
        return (v >= 1 && v <= 18) ? v + '세' : null;
      }
    },
    // "2016년", "2020년" 단독 (4자리)
    { re: /((?:19|20)\d{2})\s*년/,           fmt: m => m[1].slice(2) + '년생' },
  ];
  for (const { re, fmt } of birthTests) {
    const m = t.match(re);
    if (m) { const r = fmt(m); if (r) { result.birth = r; break; } }
  }

  return result;
}

function profileBadgeSpans(post) {
  const info  = extractChildProfile(post);
  const items = [info.height, info.weight, info.birth].filter(Boolean);
  return items.map(v => `<span class="profile-badge">${v}</span>`).join('');
}

function savedModelCard(p) {
  const badgeSpans = profileBadgeSpans(p);
  const ratings    = getRatings(p);
  const avg        = getAverageRating(p);
  const avgStr     = avg > 0 ? avg.toFixed(1) : '—';

  // 평가자별 별점 행 생성
  const ratingRows = REVIEWERS.map(reviewer => {
    const score = ratings[reviewer] || 0;
    const label = REVIEWER_LABELS[reviewer];
    const stars = [1,2,3,4,5].map(n => {
      const newScore = (n === score) ? 0 : n;  // 같은 별 클릭 → 0점 토글
      return `<span class="star ${n <= score ? 'filled' : ''}"
        onclick="event.stopPropagation();updateRating('${p.id}','${reviewer}',${newScore})"
        title="${n === score ? '초기화' : label+' '+n+'점'}">★</span>`;
    }).join('');
    return `<div class="rating-row">
      <span class="rating-name">${label}</span>
      <div class="star-rating">${stars}</div>
    </div>`;
  }).join('');

  return `
  <div class="saved-card">
    <div class="saved-card-img">
      ${p.imgUrl
        ? `<img src="${p.imgUrl}" alt="" style="width:100%;height:100%;object-fit:cover" onerror="imgFallback(this)">`
        : `<div style="width:100%;height:100%">${IMG_FALLBACK_HTML}</div>`}
    </div>
    <div class="saved-card-body">
      <div>
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <div class="saved-card-username">
            <a href="https://www.instagram.com/${p.username}/" target="_blank"
               onclick="event.stopPropagation()">@${p.username}</a>
          </div>
          ${badgeSpans}
        </div>
        <div class="saved-card-sub" style="display:flex;align-items:center;gap:5px">
          <span>${fmtNum(p.likes)}♥</span>
          <span class="avg-badge ${avg > 0 ? 'rated' : ''}">평균 ⭐${avgStr}</span>
        </div>
      </div>
      <div class="multi-rating-wrap">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
          <div class="multi-rating">${ratingRows}</div>
          <button class="btn-unsave" onclick="event.stopPropagation();toggleSave('${p.id}')" title="저장 삭제">🗑️</button>
        </div>
        <!-- 프로젝트 지정 -->
        <div style="margin-top:6px">
          <select class="project-select ${p.project ? 'has-project' : ''}"
            onclick="event.stopPropagation()"
            onchange="event.stopPropagation();updateProject('${p.id}',this.value);this.className='project-select'+(this.value?' has-project':'')">
            <option value="">📁 프로젝트 선택</option>
            ${PROJECTS.map(pr => `<option value="${pr}" ${p.project===pr?'selected':''}>${pr}</option>`).join('')}
          </select>
        </div>
        <!-- 캐스팅 메모 -->
        <div class="memo-section">
          <div class="memo-label">📝 캐스팅 & 촬영 메모</div>
          <textarea class="memo-input" rows="2"
            placeholder="실물 미팅, 피팅 사이즈, 촬영 기록 등..."
            onclick="event.stopPropagation()"
            oninput="debouncedMemo('${p.id}',this.value)">${p.memo || ''}</textarea>
        </div>
      </div>
    </div>
  </div>`;
}

async function updateRating(id, reviewer, score) {
  const model = savedModels.find(p => p.id === id);
  if (!model) return;

  // ① ratings 객체 초기화 (기존 단일 rating 하위 호환)
  if (!model.ratings) {
    model.ratings = { nicole: model.rating || 0, rachel: 0, stella: 0 };
  }

  // ② 해당 평가자 점수만 업데이트 (낙관적 UI)
  model.ratings[reviewer] = score;
  if (currentSidebarTab === 'pick')  renderPickTab();
  if (currentSidebarTab === 'final') renderFinalTab();

  // ③ post_data 통째로 Supabase에 저장 (rating 단일 컬럼 절대 사용 안 함)
  try {
    const { error } = await db
      .from('saved_models')
      .update({ post_data: { ...model } })
      .eq('id', id);

    if (error) throw error;
    const avg = getAverageRating(model);
    const label = REVIEWER_LABELS[reviewer] || reviewer;
    showToast(score === 0
      ? `${label} 별점을 초기화했어요`
      : `⭐ ${label} ${score}점 저장! (팀 평균 ${avg.toFixed(1)}점)`);
  } catch(e) {
    console.error('별점 저장 실패:', e);
    showToast('⚠️ 별점 저장에 실패했어요. 다시 시도해 주세요.');
  }
}

// ── 프로젝트 업데이트 ─────────────────────────────────
async function updateProject(id, project) {
  const model = savedModels.find(p => p.id === id);
  if (!model) return;

// ── 캐스팅 메모 업데이트 (디바운스 300ms) ──────────────
const _memoTimers = {};
function debouncedMemo(id, value) {
  clearTimeout(_memoTimers[id]);
  _memoTimers[id] = setTimeout(() => updateMemo(id, value), 300);
}

async function updateMemo(id, memo) {
  const model = savedModels.find(p => p.id === id);
  if (!model) return;
  model.memo = memo;
  try {
    await db.from('saved_models').update({ post_data: { ...model } }).eq('id', id);
  } catch(e) { console.error('메모 저장 실패:', e); }
}

// ── 노션 CSV 파싱 및 Supabase Import ─────────────────
function parseCSVLine(line) {
  const result = []; let cur = ''; let inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === ',' && !inQuote) { result.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

function parseCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]).map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').replace(/"/g,'').trim(); });
    return obj;
  }).filter(row => Object.values(row).some(v => v));
}

// 노션 컬럼명 → post_data 필드 매핑
function mapRowToPostData(row) {
  const get = (...keys) => keys.map(k => row[k] || row[k.toLowerCase()] || '').find(v => v) || '';

  const username = get('인스타ID','인스타그램','Instagram','@ID','username','인스타')
                   .replace(/^@/,'').trim();
  const fullName = get('이름','Name','name','모델명');
  const height   = get('키','Height','height','신장');
  const weight   = get('몸무게','Weight','weight','체중');
  const age      = get('나이','출생','Age','생년','년생');
  const note     = get('특징','Notes','메모','비고','특이사항','Memo');
  const category = get('카테고리','Category','분류');

  const bioArr = [height&&`키 ${height}`, weight&&`몸무게 ${weight}`, age&&`${age}`].filter(Boolean);

  return {
    id:        'notion_' + Date.now() + '_' + Math.random().toString(36).substr(2,5),
    username:  username || fullName.replace(/\s/g,'') || '알수없음',
    fullName,
    biography: bioArr.join(' / '),
    caption:   [note, category].filter(Boolean).join(' | '),
    imgUrl:    '',
    permalink: username ? `https://www.instagram.com/${username}/` : '',
    likes:     0, comments: 0, followers: null,
    timestamp: '', type: 'Notion', _real: false,
    ratings:   { nicole: 0, rachel: 0, stella: 0 },
    _source:   'notion'
  };
}

async function handleCSVFile(file) {
  if (!file || !file.name.endsWith('.csv')) { showToast('⚠️ CSV 파일만 업로드할 수 있어요'); return; }
  const progress = document.getElementById('importProgress');
  progress.innerHTML = `<div class="import-progress">📂 파일 읽는 중...</div>`;

  const text = await file.text();
  const rows = parseCSV(text);
  if (!rows.length) { progress.innerHTML = `<div class="import-progress">⚠️ 데이터를 읽지 못했어요</div>`; return; }

  progress.innerHTML = `<div class="import-progress">⏳ ${rows.length}개 데이터 Supabase에 저장 중...</div>`;

  let success = 0, skip = 0;
  for (const row of rows) {
    const postData = mapRowToPostData(row);
    if (savedIds.has(postData.id) || postData.username === '알수없음') { skip++; continue; }
    try {
      const { error } = await db.from('saved_models').insert({ id: postData.id, post_data: postData });
      if (!error) {
        savedModels.push(postData);
        savedIds.add(postData.id);
        success++;
      }
    } catch(e) { skip++; }
  }

  updateSavedBadge();
  renderPickTab();
  renderFinalTab();

  // 미리보기 테이블
  const cols = Object.keys(rows[0]).slice(0, 6);
  const tableHTML = `
    <div class="db-table-wrap">
      <table class="db-table">
        <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${rows.slice(0,20).map(r=>`<tr>${cols.map(c=>`<td>${r[c]||''}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>`;
  progress.innerHTML = `<div class="import-progress" style="color:#10b981;font-weight:700">
    ✅ ${success}개 저장 완료 (중복/오류 ${skip}개 제외) — 총 ${rows.length}개 행</div>` + tableHTML;
  showToast(`✅ 노션 데이터 ${success}개 가져왔어요!`);
}

// ── 실시간 필터 적용 ─────────────────────────────────
function applyFilters() {
  if (!currentViewBuffer.length) {
    renderCards([]);
    return;
  }
  const limit = parseInt(document.getElementById('limitSlider').value) || 20;
  allPosts = currentViewBuffer.slice(0, limit);
  sortCards('likes', document.querySelector('.sort-tab.active'));

  // 전체 수집된 고유 계정 수 표시 (예: 20 / 154개의 계정 · #키즈모델)
  const totalCollected = tagBuffers[currentTag] ? tagBuffers[currentTag].length : 0;
  const totalStr = totalCollected > allPosts.length
    ? `<strong>${allPosts.length}</strong> / ${totalCollected}개의 계정`
    : `<strong>${allPosts.length}개</strong>의 계정`;
  document.getElementById('resultInfo').innerHTML =
    `${totalStr} · <span style="color:var(--primary)">#${currentTag}</span>`;
}

// ── Apify 데이터 정규화 ───────────────────────────────
function normalizePost(p, i) {
  const username  = p.ownerUsername || p.username || p.owner?.username || p.ownerId || '알수없음';
  const fullName  = p.ownerFullName || p.fullName || p.owner?.fullName || '';
  const followers = p.ownerFollowersCount ?? p.followersCount ?? p.owner?.followersCount ?? null;
  const likes     = p.likesCount ?? p.likes ?? p.likeCount ?? 0;
  const comments  = p.commentsCount ?? p.comments ?? p.commentCount ?? 0;
  const imgUrl    = p.displayUrl || p.imageUrl || p.thumbnailUrl || p.images?.[0] || '';
  const shortCode = p.shortCode || p.code || '';
  const permalink = p.url || p.link || (shortCode ? `https://www.instagram.com/p/${shortCode}/` : '');
  const caption      = p.caption || p.text || '';
  const timestamp    = p.timestamp || p.takenAt || p.taken_at || '';
  const mediaType    = p.type || p.mediaType || (p.isVideo ? 'Video' : 'Image');
  const biography    = p.ownerBiography || p.biography || p.owner?.biography || p.bio || '';
  return {
    id: p.id || shortCode || ('post_' + Date.now() + '_' + i + '_' + Math.random().toString(36).substr(2, 5)),
    username, fullName, followers, likes, comments,
    imgUrl, permalink, caption, timestamp, biography,
    type: mediaType, _real: true
  };
}

// ── 해시태그 검색 (단순 버전) ──────────────────────────
// 검색 버튼을 누르면 해당 태그 하나만 검색
async function doSearch() {
  const tag = currentTag;
  if (!tag) { showToast('해시태그를 먼저 선택해주세요'); return; }

  const limit = parseInt(document.getElementById('limitSlider').value) || 20;
  currentTag = tag;

  // 태그별 캐시 초기화 (처음 검색 시에만)
  if (!tagBuffers[tag])    tagBuffers[tag]    = [];
  if (!tagShownUsers[tag]) tagShownUsers[tag] = new Set();

  // 버퍼에 아직 안 본 계정이 있으면 API 호출 없이 다음 배치 표시
  const unseen = tagBuffers[tag].filter(p => !tagShownUsers[tag].has(p.username));
  if (unseen.length >= Math.min(limit, 3)) {
    const batch = unseen.slice(0, limit);
    batch.forEach(p => tagShownUsers[tag].add(p.username));
    currentViewBuffer = batch;
    applyFilters();
    const left = unseen.length - batch.length;
    showBanner('success', `🔄 다음 배치 ${batch.length}개 · 남은 ${left}개`);
    return;
  }

  // 버퍼 소진 → Apify에서 같은 태그로 새로 fetch (최신 포스트 포함)
  showLoading(tag);
  document.getElementById('searchBtn').disabled = true;

  let raw = [];
  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tag, limit: 300 })  // 한 번에 300개 스캔
    });
    if (res.ok) {
      const data = await res.json();
      if (Array.isArray(data)) raw = data;
    }
  } catch(e) { raw = []; }

  document.getElementById('searchBtn').disabled = false;

  if (raw.length === 0) {
    document.getElementById('cardsGrid').innerHTML = `<div class="empty"><div style="font-size:48px">😢</div><div style="font-size:16px;font-weight:700">결과를 가져오지 못했어요</div></div>`;
    document.getElementById('resultInfo').textContent = '#' + tag + ' · 결과 없음';
    return;
  }

  // 새로 받은 결과 중 한 번도 본 적 없는 계정만 엄격하게 필터링
  const newPosts = [];
  raw.forEach((item, i) => {
    const p = normalizePost(item, i);
    // 이미 본 계정이면 무조건 버림
    if (tagShownUsers[tag].has(p.username)) return;
    // 이번 fetch에서 중복도 제거
    if (newPosts.some(x => x.username === p.username)) return;
    if (p.username === '알수없음') return;
    newPosts.push(p);
  });

  // 진짜 새로운 계정이 0개면 솔직하게 안내하고 멈춤 (재탕 없음)
  if (newPosts.length === 0) {
    document.getElementById('cardsGrid').innerHTML = `
      <div class="empty">
        <div style="font-size:48px;margin-bottom:12px">✅</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:8px">#${tag}의 최근 게시물은 모두 확인했어요</div>
        <div style="font-size:13px;color:var(--text-muted)">다른 해시태그를 검색해 보세요!</div>
      </div>`;
    document.getElementById('resultInfo').textContent = '#' + tag + ' · 모두 확인 완료';
    return;
  }

  // 새 계정을 버퍼에 추가
  tagBuffers[tag].push(...newPosts);

  // 첫 배치 표시
  const batch = newPosts.slice(0, limit);
  batch.forEach(p => tagShownUsers[tag].add(p.username));
  currentViewBuffer = batch;
  applyFilters();

  const left = newPosts.length - batch.length;
  showBanner('success',
    `✅ #${tag} 새 계정 ${batch.length}개 표시${left > 0 ? ' · 재검색하면 '+left+'개 더' : ''}`);
}

      stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span style="font-size:10px;font-family:inherit">이미지 만료</span>
  </div>`.trim();

function imgFallback(img) {
  img.onerror = null;  // 무한루프 방지
  const parent = img.parentElement;
  if (parent) {
    img.remove();
    const el = document.createElement('div');
    el.style.cssText = 'width:100%;height:100%;';
    el.innerHTML = IMG_FALLBACK_HTML;
    parent.insertAdjacentElement('afterbegin', el);
  }
}

function imgFail(id) {
  const w = document.getElementById('cimg-' + id);
  if (w) {
    const img = w.querySelector('img');
    if (img) imgFallback(img);
  }
}

// ── 모달 ─────────────────────────────────────────────
function openModal(id) {
  const p = allPosts.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = '@' + p.username;
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-img">
      ${p.imgUrl && p._real
        ? `<img src="${p.imgUrl}" alt="" style="width:100%;height:100%;object-fit:cover" onerror="imgFallback(this)">`
        : `<div style="width:100%;height:100%">${IMG_FALLBACK_HTML}</div>`}
    </div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-val">${fmtNum(p.likes)}</div><div class="modal-stat-key">좋아요</div></div>
      <div class="modal-stat"><div class="modal-stat-val">${fmtNum(p.comments)}</div><div class="modal-stat-key">댓글</div></div>
      <div class="modal-stat"><div class="modal-stat-val">${p.followers != null ? fmtNum(p.followers) : '—'}</div><div class="modal-stat-key">팔로워</div></div>
    </div>
    <div class="modal-caption">${p.caption || '(캡션 없음)'}</div>
    <div class="modal-actions">
      <button class="modal-btn primary" onclick="toggleSave('${p.id}');closeModalDirect()">
        ${savedIds.has(p.id)?'💔 저장 취소':'💝 저장하기'}
      </button>
      ${p.permalink
        ? `<a class="modal-btn secondary" href="${p.permalink}" target="_blank">📸 Instagram 보기</a>`
        : `<button class="modal-btn secondary" onclick="showToast('링크 없음')">📸 Instagram 보기</button>`
      }
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); }

// ── Supabase 설정 (팀원 공유 저장) ──────────────────────
const SUPABASE_URL = 'https://qbrpjngmuxcybhnogkfr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_wI9_TBrFW8Li1KpBDJ01Lw_fBSGfkl_';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadSavedFromDB() {
  try {
    const { data, error } = await db
      .from('saved_models')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) throw error;
    // rating은 post_data 안에 저장됨 (별도 컬럼 없음)
    return (data || []).map(row => row.post_data || {});
  } catch(e) {
    console.error('저장 목록 로드 실패:', e);
    return [];
  }
}

async function saveModelToDB(p) {
  try {
    const { error } = await db
      .from('saved_models')
      .insert({ id: p.id, post_data: p });
    if (error) throw error;
  } catch(e) { console.error('저장 실패:', e); }
}

async function deleteModelFromDB(id) {
  try {
    const { error } = await db
      .from('saved_models')
      .delete()
      .eq('id', id);
    if (error) throw error;
  } catch(e) { console.error('삭제 실패:', e); }
}

async function toggleSave(id) {
  const p = allPosts.find(x => x.id === id);
  const nowSaved = savedIds.has(id);

  if (nowSaved) {
    // ① 로컬 캐시에서 즉시 제거
    savedIds.delete(id);
    savedModels = savedModels.filter(x => x.id !== id);
    // ② 백그라운드로 DB 삭제 (await 없이 실행해 UI 블로킹 방지)
    deleteModelFromDB(id);
    showToast('저장을 취소했어요');
  } else {
    if (!p) return;
    // ① 로컬 캐시에 즉시 추가
    savedIds.add(id);
    savedModels.push(p);
    // ② 백그라운드로 DB 저장
    saveModelToDB(p);
    showToast('💝 @' + p.username + ' 저장!');
  }

  // 배지 업데이트
  updateSavedBadge();
  updateTabBadges();

  // 현재 활성 탭 갱신 (cardsGrid 불변)
  if (currentSidebarTab === 'pick')  renderPickTab();
  if (currentSidebarTab === 'final') renderFinalTab();

  // 검색 결과 카드의 버튼만 DOM 업데이트 (전체 재렌더링 없음)
  const card = document.querySelector(`.card[data-post-id="${id}"]`);
  if (card) {
    const isSaved = savedIds.has(id);
    const favBtn  = card.querySelector('.fav-btn');
    const saveBtn = card.querySelector('.btn-save');
    if (favBtn) { favBtn.textContent = isSaved ? '❤️' : '🤍'; favBtn.classList.toggle('active', isSaved); }
    if (saveBtn) { saveBtn.textContent = isSaved ? '💔 저장취소' : '💝 저장하기'; }
  }
}

// ── 정렬 & 필터 ───────────────────────────────────────
function sortCards(by, btn) {
  document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const sorted = [...allPosts];
  if (by === 'likes')    sorted.sort((a,b) => b.likes - a.likes);
  if (by === 'comments') sorted.sort((a,b) => b.comments - a.comments);
  if (by === 'recent')   sorted.sort((a,b) => new Date(b.timestamp||0) - new Date(a.timestamp||0));
  renderCards(sorted);
}

  currentTag = tag;          // 전역 변수에 선택된 태그 저장
  renderHashtagChips();      // 선택된 칩 활성화 표시
  doSearch();
}

// ── 유틸 ─────────────────────────────────────────────
function fmtNum(n) {
  if (n == null) return '—';
  return n >= 10000 ? (n/10000).toFixed(1)+'만' : n >= 1000 ? (n/1000).toFixed(1)+'천' : String(n);
}
function getEmoji(i) { return ['👧','🧒','👦','🌸','🎀','⭐','🌟','🦋','🌈','🍀'][i%10]; }
function setStatus(text, live) {
  document.getElementById('apiText').textContent = text;
  document.getElementById('apiDot').className = 'dot' + (live ? ' live' : '');
}
function showBanner(type, msg) {
  const colors = { success: ['#F0FDF4','#BBF7D0','#166534'], error: ['#FFF1F2','#FFD0D3','#9B1C1C'], warning: ['#FFFBEB','#FDE68A','#92400E'] };
  const [bg, border, text] = colors[type] || colors.success;
  document.getElementById('infoBanner').innerHTML =
    `<div style="background:${bg};border:1px solid ${border};border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:${text}">${msg}</div>`;
  setTimeout(() => { document.getElementById('infoBanner').innerHTML = ''; }, 6000);
}
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── URL 파라미터로 탭 자동 전환 ───────────────────────
// 예: ?tab=firstpick  →  1차 픽 탭
//     ?tab=final      →  최종 누적 탭
window.addEventListener('load', () => {
  const tab = new URLSearchParams(window.location.search).get('tab');
  if (!tab) return;

  const key = tab.toLowerCase().replace(/\s+/g, '');

  let targetTab = null;
  if (key === 'firstpick' || key === '1차픽' || key === 'pick') {
    targetTab = 'pick';
  } else if (key === 'final' || key === '최종누적' || key === '최종') {
    targetTab = 'final';
  }

  if (targetTab) switchTab(targetTab);
});
</script>
